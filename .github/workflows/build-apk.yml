name: Build TradeLog APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Install imagemagick
        run: sudo apt-get install -y imagemagick

      - name: Download app icon
        run: |
          curl -L "https://calojemax.github.io/tradejournal/icons/icon-512.png" -o icon.png 2>/dev/null
          ls -la icon.png

      - name: Create TWA Android Project
        run: |
          mkdir -p twa-app/app/src/main/res/mipmap-mdpi
          mkdir -p twa-app/app/src/main/res/mipmap-hdpi
          mkdir -p twa-app/app/src/main/res/mipmap-xhdpi
          mkdir -p twa-app/app/src/main/res/mipmap-xxhdpi
          mkdir -p twa-app/app/src/main/res/mipmap-xxxhdpi
          mkdir -p twa-app/app/src/main/res/values
          mkdir -p twa-app/app/src/main/java/com/tradelog/app

          # Resize icon with imagemagick
          convert icon.png -resize 48x48 twa-app/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert icon.png -resize 72x72 twa-app/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert icon.png -resize 96x96 twa-app/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert icon.png -resize 144x144 twa-app/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert icon.png -resize 192x192 twa-app/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          cat > twa-app/settings.gradle << 'EOF'
          rootProject.name = "TradeLog"
          include ':app'
          EOF

          cat > twa-app/build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat > twa-app/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          mkdir -p twa-app/gradle/wrapper
          cat > twa-app/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cat > twa-app/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.tradelog.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.tradelog.app"
                  minSdk 21
                  targetSdk 34
                  versionCode 2
                  versionName "1.0.1"
              }
              buildTypes {
                  release { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          EOF

          cat > twa-app/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="TradeLog"
                  android:icon="@mipmap/ic_launcher"
                  android:theme="@style/Theme.App">
                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true">
                      <meta-data
                          android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="https://calojemax.github.io/tradejournal/" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                          android:resource="@color/colorPrimary" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.SPLASH_IMAGE_DRAWABLE"
                          android:resource="@mipmap/ic_launcher"/>
                      <meta-data
                          android:name="android.support.customtabs.trusted.SPLASH_SCREEN_BACKGROUND_COLOR"
                          android:resource="@color/colorPrimary"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW"/>
                          <category android:name="android.intent.category.DEFAULT"/>
                          <category android:name="android.intent.category.BROWSABLE"/>
                          <data android:scheme="https"
                                android:host="calojemax.github.io"
                                android:pathPrefix="/tradejournal"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > twa-app/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">TradeLog</string>
          </resources>
          EOF

          cat > twa-app/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.App" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">#0a0a0f</item>
              </style>
          </resources>
          EOF

          cat > twa-app/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#0a0a0f</color>
          </resources>
          EOF

      - name: Setup Gradle wrapper
        run: |
          cd twa-app
          gradle wrapper --gradle-version 8.2

      - name: Build debug APK
        run: |
          cd twa-app
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Find APK
        run: find twa-app -name "*.apk" | head -10

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TradeLog-APK
          path: twa-app/**/*.apk
          retention-days: 30
