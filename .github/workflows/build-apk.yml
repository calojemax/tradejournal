name: Build TradeLog APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore $HOME/tradelog.keystore \
            -alias tradelog \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass tradelog123 -keypass tradelog123 \
            -dname "CN=TradeLog,O=TradeLog,C=TR"

      - name: Create twa-manifest.json
        run: |
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "com.tradelog.app",
            "host": "calojemax.github.io",
            "startUrl": "/tradejournal/",
            "name": "TradeLog",
            "launcherName": "TradeLog",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#0a0a0f",
            "navigationColor": "#0a0a0f",
            "navigationColorDark": "#0a0a0f",
            "navigationDividerColor": "#0a0a0f",
            "navigationDividerColorDark": "#0a0a0f",
            "backgroundColor": "#0a0a0f",
            "enableNotifications": false,
            "shortcuts": [],
            "iconUrl": "https://calojemax.github.io/tradejournal/icons/icon-512.png",
            "maskableIconUrl": "https://calojemax.github.io/tradejournal/icons/icon-512.png",
            "monochromeIconUrl": "https://calojemax.github.io/tradejournal/icons/icon-512.png",
            "appVersion": "1.0.0",
            "appVersionCode": 1,
            "signingKey": {
              "path": "/root/tradelog.keystore",
              "alias": "tradelog"
            },
            "minSdkVersion": 19,
            "targetSdkVersion": 34,
            "retainedBundles": [],
            "features": {},
            "alphaDependencies": { "enabled": false },
            "enableSiteSettingsShortcut": false,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://calojemax.github.io/tradejournal/",
            "webManifestUrl": "https://calojemax.github.io/tradejournal/manifest.json",
            "generatorApp": "bubblewrap-cli",
            "sdkVersion": "1.21.1",
            "useBrowserOnChromeOS": false,
            "fallbackType": "customtabs"
          }
          EOF

      - name: Build APK
        env:
          SIGNING_STORE_PASSWORD: tradelog123
          SIGNING_KEY_PASSWORD: tradelog123
        run: bubblewrap build --skipPwaValidation

      - name: Find APK files
        run: find . -name "*.apk" -o -name "*.aab" 2>/dev/null | head -20

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TradeLog-APK
          path: |
            **/*.apk
            **/*.aab
          if-no-files-found: warn
          retention-days: 30
